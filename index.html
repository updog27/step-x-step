<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Step x Step</title>

  <!-- App Icons -->
  <link rel="icon" type="image/png" sizes="192x192" href="assets/app-icon-192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="assets/app-icon-512.png">

  <!-- Splash Screen (iOS / PWA) -->
  <link rel="apple-touch-startup-image" href="assets/splash-screen.png">

  <!-- Styles -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Onboarding / Welcome Screen -->
  <div id="welcome-screen">
    <img src="assets/background-waves.png" alt="Background Waves" class="waves">
    <img src="assets/onboarding-logo.png" alt="Step x Step Logo" class="logo">
  </div>

  <!-- Your main app content goes here -->
  <div id="app-content" style="display:none;">
    <!-- App HTML here -->
    <h1>Welcome to Step x Step!</h1>
  </div>

  <script>
    // Fade out onboarding screen
    window.addEventListener('load', () => {
      const welcome = document.getElementById('welcome-screen');
      const appContent = document.getElementById('app-content');

      setTimeout(() => {
        welcome.style.opacity = 0;
        welcome.style.transition = 'opacity 0.8s ease';
      }, 2000);

      // Remove from view and show app content after fade
      setTimeout(() => {
        welcome.style.display = 'none';
        appContent.style.display = 'block';
      }, 2800);
    });
  </script>
</body>
</html>
