<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Step x Step</title>

<link rel="stylesheet" href="style.css">

<link
rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
/>

<style>

body{
font-family: Arial, Helvetica, sans-serif;
text-align:center;
margin:0;
padding:20px;
background:#f4f6f8;
}

#logo{
width:120px;
margin-bottom:10px;
}

section{
margin:20px 0;
}

input, select, button{
padding:10px;
margin:5px;
font-size:16px;
}

#map{
height:320px;
width:100%;
margin-top:10px;
border-radius:10px;
}

.avatar-option{
width:70px;
margin:10px;
border-radius:10px;
cursor:pointer;
border:2px solid transparent;
}

.avatar-option.selected{
border:2px solid #2a7cff;
}

</style>

</head>


<body>

<header>

<img src="logo.png" id="logo">

<h1>Step x Step</h1>

</header>


<main>

<!-- DISTANCE INPUT -->

<section>

<h2>Enter Distance</h2>

<input
type="number"
id="distance-input"
step="0.01"
placeholder="Distance"
>

<br>

<select id="distance-unit">

<option value="miles">Miles</option>
<option value="km">Kilometers</option>

</select>

<select id="route-type">

<option value="outback">Out-and-back</option>
<option value="loop">Loop</option>
<option value="free">Free run</option>

</select>

<br>

<button id="start-button">

Start Walk

</button>

</section>



<!-- DISTANCE + STEPS -->

<section id="step-counter">

<h2>Distance</h2>
<p id="distance">0.00 miles</p>

<h2>Steps</h2>
<p id="steps">0</p>

</section>



<!-- MAP -->

<section>

<h2>Your Route</h2>

<div id="map"></div>

</section>



<!-- ACHIEVEMENTS -->

<section>

<h2>Achievements</h2>

<ul id="achievement-list"></ul>

</section>



<!-- AVATAR -->

<section>

<h2>Avatar</h2>

<img src="avatar1.png" class="avatar-option">
<img src="avatar2.png" class="avatar-option">

</section>



<!-- SOCIAL -->

<section>

<label>

<input type="checkbox">

Enable friends / updates

</label>

</section>

</main>



<script
src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
></script>

<script src="script.js"></script>


</body>
</html>
