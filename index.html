<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Step x Step</title>

<link rel="stylesheet" href="style.css">

<!-- Leaflet Map Library -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>

body{
font-family: Arial, Helvetica, sans-serif;
text-align:center;
margin:0;
padding:20px;
background:#f4f6f8;
}

#logo{
width:120px;
margin-bottom:10px;
}

section{
margin:25px 0;
}

input, select, button{
padding:10px;
margin:5px;
font-size:16px;
}

#map{
height:320px;
width:100%;
border-radius:10px;
margin-top:15px;
}

.avatar-option{
width:70px;
margin:10px;
border-radius:10px;
cursor:pointer;
border:2px solid transparent;
}

.avatar-option.selected{
border:2px solid #2a7cff;
}

</style>

</head>


<body>

<header>

<img src="logo.png" alt="Step x Step Logo" id="logo">

<h1>Step x Step</h1>

</header>


<main>

<section id="distance-section">

<h2>Enter Distance</h2>

<input
type="number"
id="distance-input"
placeholder="Distance (miles)"
step="0.01">

<br>

<button id="start-button">Start Walk</button>

</section>



<section id="step-counter">

<h2>Distance Traveled</h2>
<p id="distance">0.00 miles</p>

<h2>Steps</h2>
<p id="steps">0</p>

</section>



<section>

<h2>Your Route</h2>

<div id="map"></div>

</section>



<section id="achievements">

<h2>Achievements</h2>

<ul id="achievement-list"></ul>

</section>



<section id="avatar-section">

<h2>Choose Your Avatar</h2>

<img src="avatar1.png" class="avatar-option">
<img src="avatar2.png" class="avatar-option">

</section>



<section id="social-toggle">

<label>

<input type="checkbox" id="social-enable">

Enable Friends / Updates

</label>

</section>

</main>



<!-- Leaflet Map Library -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>


<!-- Your App Script -->
<script src="script.js"></script>


</body>
</html>
