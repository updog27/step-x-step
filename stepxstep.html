<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Step x Step Demo</title>
<style>
/* Basic reset */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: Arial, sans-serif;
  background: #f0f8ff;
  color: #333;
  padding: 20px;
}

header {
  text-align: center;
  margin-bottom: 20px;
}

h1 {
  font-size: 2em;
  margin-top: 10px;
}

main {
  max-width: 600px;
  margin: 0 auto;
}

section {
  background: #ffffff;
  padding: 15px;
  margin-bottom: 15px;
  border-radius: 10px;
  box-shadow: 0 0 10px rgba(0,0,0,0.1);
}

input, select, button {
  padding: 10px;
  font-size: 1em;
  margin-top: 10px;
  width: 100%;
  border-radius: 5px;
  border: 1px solid #ccc;
}

button {
  background: #28a745;
  color: white;
  border: none;
  cursor: pointer;
}

button:hover {
  background: #218838;
}

#step-counter {
  text-align: center;
  font-size: 1.2em;
}

#achievement-list {
  list-style: none;
  padding-left: 0;
}

.avatar-option {
  width: 60px;
  margin: 5px;
  cursor: pointer;
  border: 2px solid transparent;
  border-radius: 50%;
  display: inline-block;
  text-align: center;
  line-height: 60px;
  font-size: 30px;
  user-select: none;
}

.avatar-option.selected {
  border-color: #28a745;
}
</style>
</head>
<body>
<header>
  <h1>Step x Step</h1>
</header>

<main>
  <section id="distance-section">
    <h2>Enter your distance</h2>
    <input type="number" id="distance-input" placeholder="Distance in miles">
    <select id="route-type">
      <option value="outback">Out-and-back</option>
      <option value="loop">Loop</option>
      <option value="freerun">Free-run</option>
    </select>
    <button id="start-button">Start</button>
  </section>

  <section id="step-counter">
    <h2>Steps: <span id="steps">0</span></h2>
  </section>

  <section id="achievements">
    <h2>Achievements</h2>
    <ul id="achievement-list"></ul>
  </section>

  <section id="avatar-section">
    <h2>Choose Avatar</h2>
    <!-- Using emojis as placeholders -->
    <div class="avatar-option" data-avatar="😀">😀</div>
    <div class="avatar-option" data-avatar="😎">😎</div>
    <div class="avatar-option" data-avatar="🕺">🕺</div>
  </section>

  <section id="social-toggle">
    <label>
      <input type="checkbox" id="social-enable">
      Enable friends/updates
    </label>
  </section>
</main>

<script>
// Step counter logic
let steps = 0;
const stepsDisplay = document.getElementById('steps');
const startButton = document.getElementById('start-button');

startButton.addEventListener('click', () => {
  const distanceInput = document.getElementById('distance-input').value;
  const distance = parseFloat(distanceInput);
  if (isNaN(distance) || distance <= 0) {
    alert('Please enter a valid distance.');
    return;
  }

  // Approximate: 2000 steps per mile
  steps = Math.round(distance * 2000);
  stepsDisplay.textContent = steps;

  // Add a simple achievement
  const achievementList = document.getElementById('achievement-list');
  const li = document.createElement('li');
  li.textContent = `Completed ${distance} miles!`;
  achievementList.appendChild(li);
});

// Avatar selection
const avatars = document.querySelectorAll('.avatar-option');
avatars.forEach(av => {
  av.addEventListener('click', () => {
    avatars.forEach(a => a.classList.remove('selected'));
    av.classList.add('selected');
  });
});
</script>
</body>
</html>
